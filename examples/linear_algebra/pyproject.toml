[build-system]
requires = ["setuptools", "cython", "numpy"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "linear_algebra"
version = "0.1.0"
description = "Python bindings for linear_algebra, generated by rust2cython."
requires-python = ">=3.8"
dependencies = ["numpy"]

[tool.rust2cython]
source = "examples/linear_algebra/src/lib.rs"
generated_by = "rust2cython"
