[build-system]
requires = ["setuptools", "cython", "numpy"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "bio_sequence"
version = "0.1.0"
description = "Python bindings for bio_sequence, generated by rust2cython."
requires-python = ">=3.8"
dependencies = ["numpy"]

[tool.rust2cython]
source = "examples/bio_sequence/src/lib.rs"
generated_by = "rust2cython"
