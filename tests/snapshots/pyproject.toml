[build-system]
requires = ["setuptools", "cython", "numpy"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "simple"
version = "0.1.0"
description = "Python bindings for simple, generated by rust2cython."
requires-python = ">=3.8"
dependencies = ["numpy"]

[tool.rust2cython]
source = "tests/fixtures/simple.rs"
generated_by = "rust2cython"
